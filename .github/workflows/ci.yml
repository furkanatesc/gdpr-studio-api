name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Bağımlılıklar
        run: pip install -e ".[api,dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Testler (pytest — birim + golden grounding)
        run: pytest -q
